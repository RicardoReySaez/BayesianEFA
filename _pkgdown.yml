url: https://ricardoreysaez.github.io/BayesianEFA/

home:
  title: Bayesian Exploratory Factor Analysis

authors:
  Ricardo Rey-Sáez:
    href: https://ricardoreysaez.github.io/

template:
  bootstrap: 5
  math-rendering: mathjax
  light-switch: true
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    danger: "#A6081A"
  includes:
    in_header: |
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous" onload="renderMathInElement(document.body);"></script>

navbar:
  structure:
    left:  [intro, examples, news, reference]
    right: [search, lightswitch, github]
  components:
    intro:
      text: Getting Started
      href: articles/getting_started.html
    examples:
      text: Examples
      menu:
        - text: "Fixing Rotational Indeterminacy"
          href: articles/alignment.html
    news:
      text: News
      href: news/index.html
    reference:
      text: Functions
      href: reference/index.html

articles:
  - title: Tutorials
    navbar: ~
    contents:
      - getting_started
  - title: Advanced Topics
    contents:
      - alignment

reference:
  - title: "All Functions"
    desc: >
      Complete list of functions and datasets available in the BayesianEFA package.
    contents:
      - befa
      - summary.befa
      - rsp_align
      - befa_factor_scores
      - extract_posterior_draws
      - posterior_summaries
      - befa_fit_measures
      - befa_reliability
      - print.summary.befa
      - print.befa_fitmeasures
      - HS_data
      - BayesianEFA-package
